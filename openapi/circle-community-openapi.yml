    delete:
      tags: [Admin - Spaces]
      summary: Remove a member from a space
      security:
        - tokenAuth: []
      responses:
        '200': { description: Removal result. }
  /api/admin/v2/posts:
    get:
      tags: [Admin - Posts]
      summary: List posts
      security:
        - tokenAuth: []
      parameters:
        - { name: page, in: query, schema: { type: integer, default: 1 } }
