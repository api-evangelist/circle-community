      responses:
        '200': { description: A page of notifications. }
  /api/headless/v1/profile:
    put:
      tags: [Headless - Member]
      summary: Update the member profile
      security:
        - bearerAuth: []
      responses:
        '200': { description: The updated profile. }
components:
  securitySchemes:
    tokenAuth:
      type: apiKey
      in: header
      name: Authorization
      description: >-
        Admin API token in the format "Token AUTH_TOKEN". Community admins
        generate the token on the Developers -> Tokens page.
    bearerAuth:
      type: http
      scheme: bearer
      description: >-
        Member-scoped JWT access token from /api/v1/headless/auth_token in the
        format "Bearer ACCESS_TOKEN". Expires after one hour.
  schemas:
    HeadlessAuthToken:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        access_token_expires_at: { type: string }
        refresh_token_expires_at: { type: string }
        community_member_id: { type: integer }
        community_id: { type: integer }
