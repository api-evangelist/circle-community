      - { name: id, in: path, required: true, schema: { type: integer } }
    get:
      tags: [Admin - Members]
      summary: Retrieve a community member
      security:
        - tokenAuth: []
      responses:
        '200': { description: The community member. }
    put:
      tags: [Admin - Members]
      summary: Update a community member
      security:
        - tokenAuth: []
      responses:
        '200': { description: The updated member. }
    delete:
      tags: [Admin - Members]
      summary: Delete a community member
      security:
