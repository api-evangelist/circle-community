      summary: List course sections
      security:
        - bearerAuth: []
      parameters:
        - { name: course_id, in: path, required: true, schema: { type: integer } }
      responses:
        '200': { description: The course sections. }
  /api/headless/v1/courses/{course_id}/lessons/{id}:
    get:
      tags: [Headless - Member]
      summary: Get a course lesson
      security:
        - bearerAuth: []
      parameters:
        - { name: course_id, in: path, required: true, schema: { type: integer } }
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '200': { description: The course lesson. }
  /api/headless/v1/messages:
    get:
      tags: [Headless - Member]
      summary: List chat rooms / direct messages
      security:
        - bearerAuth: []
      responses:
        '200': { description: The member's chat rooms. }
    post:
      tags: [Headless - Member]
      summary: Start a chat room / direct message
      security:
        - bearerAuth: []
      responses:
        '200': { description: The created chat room. }
  /api/headless/v1/messages/{chat_room_uuid}/chat_room_messages:
    get:
      tags: [Headless - Member]
      summary: List messages in a chat room
      security:
        - bearerAuth: []
      parameters:
        - { name: chat_room_uuid, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: A page of chat messages. }
    post:
      tags: [Headless - Member]
      summary: Send a message to a chat room
      security:
        - bearerAuth: []
      parameters:
        - { name: chat_room_uuid, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: The sent message. }
  /api/headless/v1/notifications:
