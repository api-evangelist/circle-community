openapi: 3.0.3
info:
  title: Circle Developer Platform API
  description: >-
    Circle (circle.so) is an all-in-one community platform for creators, coaches,
    and brands. This description grounds Circle's documented public developer
    platform into a single OpenAPI file for discovery. It covers two admin- or
    member-authenticated REST surfaces: the Admin API V2 (base
    https://app.circle.so/api/admin/v2) for community administration and
    automation, and the Headless Member API (base
    https://app.circle.so/api/headless/v1) for building your own member-facing
    experience, plus the Headless Auth API token exchange. Admin API requests use
    an "Authorization: Token AUTH_TOKEN" header; Headless Member API requests use
    a member-scoped JWT in an "Authorization: Bearer ACCESS_TOKEN" header issued
    by the Auth API. API access is gated to the Business plan and above. This is
    the community-software company at circle.so, NOT the USDC / stablecoin
    financial-services company. Paths shown are a representative, grounded subset
    of the full reference published at api-headless.circle.so.
  version: '2.0'
  contact:
    name: Circle
    url: https://circle.so
  license:
    name: Proprietary
    url: https://circle.so/terms
servers:
  - url: https://app.circle.so
    description: Circle production
security:
  - tokenAuth: []
tags:
  - name: Admin - Members
    description: Admin-authenticated community member management.
  - name: Admin - Spaces
    description: Spaces, space groups, and their memberships.
  - name: Admin - Posts
    description: Posts, comments, and topics.
  - name: Admin - Events
    description: Events and event attendees.
  - name: Admin - Courses
    description: Course sections, lessons, and progress.
  - name: Headless - Auth
    description: Member JWT token exchange for the Headless Member API.
  - name: Headless - Member
    description: Member-authenticated experience endpoints.
paths:
  /api/admin/v2/community_members:
    get:
      tags: [Admin - Members]
      summary: List community members
      security:
        - tokenAuth: []
      parameters:
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: per_page, in: query, schema: { type: integer, default: 10 } }
      responses:
        '200': { description: A page of community members. }
    post:
      tags: [Admin - Members]
      summary: Invite or create a community member
      security:
        - tokenAuth: []
      responses:
        '200': { description: The created or invited member. }
  /api/admin/v2/community_members/search:
