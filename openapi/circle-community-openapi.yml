      tags: [Admin - Posts]
      summary: List comments
      security:
        - tokenAuth: []
      responses:
        '200': { description: A page of comments. }
    post:
      tags: [Admin - Posts]
      summary: Create a comment
      security:
        - tokenAuth: []
      responses:
        '200': { description: The created comment. }
  /api/admin/v2/comments/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer } }
    get:
