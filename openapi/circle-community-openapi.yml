    get:
      tags: [Headless - Member]
      summary: List comments on a post
      security:
        - bearerAuth: []
      parameters:
        - { name: post_id, in: path, required: true, schema: { type: integer } }
      responses:
        '200': { description: A page of comments. }
    post:
      tags: [Headless - Member]
      summary: Comment on a post
      security:
        - bearerAuth: []
      parameters:
        - { name: post_id, in: path, required: true, schema: { type: integer } }
      responses:
        '200': { description: The created comment. }
  /api/headless/v1/posts/{post_id}/user_likes:
    post:
      tags: [Headless - Member]
      summary: Like a post
      security:
        - bearerAuth: []
      parameters:
        - { name: post_id, in: path, required: true, schema: { type: integer } }
      responses:
        '200': { description: Like result. }
  /api/headless/v1/community_events:
    get:
      tags: [Headless - Member]
      summary: List community events
      security:
        - bearerAuth: []
      responses:
        '200': { description: A page of community events. }
  /api/headless/v1/events/{event_id}/event_attendees:
    post:
      tags: [Headless - Member]
      summary: RSVP to an event
      security:
        - bearerAuth: []
      parameters:
        - { name: event_id, in: path, required: true, schema: { type: integer } }
      responses:
        '200': { description: The RSVP. }
