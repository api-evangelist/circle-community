      tags: [Headless - Auth]
      summary: Exchange a headless auth token for a member JWT
      description: >-
        Server-to-server exchange of a community-level headless auth token for a
        member-scoped JWT access token plus refresh token. Access tokens expire
        after one hour.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The issued access and refresh tokens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HeadlessAuthToken'
