    sections and course lessons, and set a member's course lesson progress.
    Backs the learning / cohort experiences built on Circle spaces.
- aid: circle-community:circle-community-headless-member-api
  name: Circle Headless Member API
  tags:
  - Headless
  - Member API
  - Feed
  - Posts
  - Messaging
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://api.circle.so/apis/headless/member-api
  baseURL: https://app.circle.so/api/headless/v1
  properties:
  - url: https://api.circle.so/apis/headless
    type: Documentation
  - url: https://api-headless.circle.so/?urls.primaryName=Member+APIs
    type: APIReference
  - url: openapi/circle-community-openapi.yml
    type: OpenAPI
  - url: collections/circle-community.postman_collection.json
    type: PostmanCollection
  - url: collections/circle-community.opencollection.json
    type: OpenCollection
  description: >-
    Member-authenticated server-side API for building your own member-facing
    experience - home feed, spaces, posts, comments, likes and reactions,
    bookmarks, community events and RSVPs, courses and lessons, direct
    messages and chat rooms, notifications, and profile. Requests carry a
    member-specific JWT access token (Bearer) issued by the Auth API.
- aid: circle-community:circle-community-headless-auth-api
  name: Circle Headless Auth API
  tags:
  - Headless
  - Authentication
  - JWT
  - Tokens
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://api.circle.so/apis/headless/quick-start
  baseURL: https://app.circle.so/api/v1/headless
  properties:
  - url: https://api.circle.so/apis/headless/quick-start
    type: Documentation
  - url: https://api-headless.circle.so/?urls.primaryName=Auth+APIs
    type: APIReference
  - url: openapi/circle-community-openapi.yml
    type: OpenAPI
  description: >-
    Server-to-server authentication API that exchanges a community-level
    headless auth token for a member-scoped JWT access token (and refresh
    token) used to call the Member API. Access tokens expire after one hour and
    are refreshed via the refresh token. Auth SDKs exist for Node.js, Ruby, Go,
    and Python.
- aid: circle-community:circle-community-realtime-websocket-api
  name: Circle Realtime WebSocket API
  tags:
  - WebSocket
  - Realtime
  - Chat
  - Notifications
  - ActionCable
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://api.circle.so/get-started/websockets-beta
  baseURL: wss://app.circle.so/cable
  properties:
  - url: https://api.circle.so/get-started/websockets-beta
    type: Documentation
  - url: asyncapi/circle-community-asyncapi.yml
    type: AsyncAPI
  description: >-
    Beta ActionCable (Rails) WebSocket surface for realtime chat and
    notifications, connected at wss://app.circle.so/cable with a member Bearer
    access token and a whitelisted Origin header. Exposes a NotificationChannel
    (new-notification and unread-count events) and three chat channels for
    member-level room updates, room-wide messages, and thread events.
