aid: circle-community
url: https://raw.githubusercontent.com/api-evangelist/circle-community/refs/heads/main/apis.yml
name: Circle
kind: company
description: >-
  Circle (circle.so) is an all-in-one community platform for creators, coaches,
  and brands - hosting discussions, courses, events, live streams, memberships,
  paywalls, and chat under a single branded space. This is the community
  software company at circle.so, NOT the USDC / stablecoin financial-services
  company. Circle exposes a documented public developer platform: an
  admin-authenticated Admin API (V2) for automations, migrations, and bulk
  administration; a Headless offering (Member API plus Auth API) for embedding
  Circle features into your own website or app via member-scoped JWT tokens; and
  a beta ActionCable WebSocket surface for realtime chat and notifications. API
  access is plan-gated to the Business plan and above.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Community
- Creators
- Courses
- Memberships
- Events
- Chat
- Community Platform
created: '2026-07-05'
modified: '2026-07-05'
