description: >-
  FinOps view of Circle (circle.so) spend. Circle is billed as a flat monthly
  subscription per published tier (Professional, Business, Enterprise, Circle
  Plus), NOT as metered API usage - so the dominant cost line is the plan
  subscription rather than per-request charges. The developer platform (Admin
  API, Headless Member/Auth API, WebSocket) is a feature unlocked by the
  Business plan and above, meaning API access cost is effectively the delta of
  moving up to the Business tier. A separate per-transaction fee applies to
  payments processed through Circle (2 percent Professional, 1 percent Business,
  0.5 percent Circle Plus), which scales with commerce volume. This is the
  community-software company at circle.so, NOT the USDC / crypto company.
notes: >-
  Subscription rates and transaction-fee percentages reflect published tiers as
  of the review date; verify on circle.so/pricing. There is no separate metered
  API charge beyond the plan subscription and the documented rate limit.
