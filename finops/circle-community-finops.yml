meters:
- name: plan_subscription
  description: Flat monthly platform subscription for the chosen Circle plan tier.
  unit: subscription
  aggregation: sum
  dimensions:
  - account
  - plan
- name: transaction_fee
  description: Per-transaction percentage fee on payments processed through Circle (2 percent Professional, 1 percent Business, 0.5 percent Circle Plus).
  unit: percent
  aggregation: sum
  dimensions:
  - account
  - plan
- name: api_requests
  description: Admin API requests, bounded by the 2000-per-5-minutes-per-IP rate limit; not separately billed.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - ip
principles:
- name: Visibility
  description: Track the plan subscription line and payment transaction fees; monitor Admin API usage in the Developers tab against the rate limit.
- name: Allocation
  description: Map the Circle subscription to the team or brand that owns the community; attribute transaction fees to the commerce it supports.
- name: Optimization
  description: Right-size the plan to the features actually used - move to Business only when API access, automations, or the lower 1 percent transaction fee justify the delta; consolidate communities to avoid duplicate subscriptions.
- name: Accountability
  description: Assign an owner for the Circle subscription and review tier, seat, storage, and transaction-fee costs against community value each billing cycle.
